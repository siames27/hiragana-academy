<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amarin Hiragana Academy</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: #1f2833;
            --accent: #45f3ff;
            --text-main: #c5c6c7;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid #2f3e46;
            text-align: center;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #8b9bb4;
            margin-bottom: 20px;
            border-bottom: 1px solid #2f3e46;
            padding-bottom: 10px;
        }
        .score-val { color: var(--accent); font-weight: bold; }
        .question-card {
            background: #151a21;
            border-radius: 12px;
            padding: 40px 20px;
            margin-bottom: 25px;
            border: 1px solid #252e3b;
        }
        .kana-display {
            font-size: 5rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.3);
        }
        .mode-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5f758e;
            margin-top: 10px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .option-btn {
            background: #252e3b;
            border: 2px solid #344457;
            color: #fff;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .option-btn:active { transform: scale(0.95); }
        .option-btn.correct { background: var(--correct) !important; border-color: var(--correct); color: #000; }
        .option-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); color: #fff; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="stats-bar">
            <div>Doğru: <span id="score" class="score-val">0</span></div>
            <div>Seri (Streak): <span id="streak" class="score-val" style="color:#ffaa00">0</span></div>
        </div>

        <div class="question-card">
            <div class="kana-display" id="kanaTarget">あ</div>
            <div class="mode-label">Romaji Karşılığını Seç</div>
        </div>

        <div class="options-grid" id="optionsContainer">
            </div>
    </div>

    <script>
        // Temel Hiragana Veri Seti (Gömülü Kütüphane)
        const hiraganaData = [
            { kana: "あ", romaji: "a" }, { kana: "い", romaji: "i" }, { kana: "う", romaji: "u" }, { kana: "え", romaji: "e" }, { kana: "お", romaji: "o" },
            { kana: "か", romaji: "ka" }, { kana: "き", romaji: "ki" }, { kana: "く", romaji: "ku" }, { kana: "け", romaji: "ke" }, { kana: "こ", romaji: "ko" },
            { kana: "さ", romaji: "sa" }, { kana: "し", romaji: "shi" }, { kana: "す", romaji: "su" }, { kana: "せ", romaji: "se" }, { kana: "そ", romaji: "so" },
            { kana: "た", romaji: "ta" }, { kana: "ち", romaji: "chi" }, { kana: "つ", romaji: "tsu" }, { kana: "て", romaji: "te" }, { kana: "と", romaji: "to" }
        ];

        let currentQuestion = null;
        let score = parseInt(localStorage.getItem('jp_score')) || 0;
        let streak = parseInt(localStorage.getItem('jp_streak')) || 0;
        let canAnswer = true;

        const kanaTarget = document.getElementById('kanaTarget');
        const optionsContainer = document.getElementById('optionsContainer');
        const scoreDisplay = document.getElementById('score');
        const streakDisplay = document.getElementById('streak');

        function initQuiz() {
            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            generateQuestion();
        }

        function generateQuestion() {
            canAnswer = true;
            // Rastgele bir karakter seç
            currentQuestion = hiraganaData[Math.floor(Math.random() * hiraganaData.length)];
            kanaTarget.innerText = currentQuestion.kana;

            // Yanlış şıkları ayarla
            let wrongOptions = hiraganaData
                .filter(item => item.romaji !== currentQuestion.romaji)
                .map(item => item.romaji);
            
            // Yanlış şıklardan rastgele 3 tane seç ve karıştır
            wrongOptions = wrongOptions.sort(() => 0.5 - Math.random()).slice(0, 3);
            let allOptions = [...wrongOptions, currentQuestion.romaji].sort(() => 0.5 - Math.random());

            // Arayüze bas
            optionsContainer.innerHTML = '';
            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, chosenRomaji) {
            if (!canAnswer) return;
            canAnswer = false;

            const buttons = optionsContainer.querySelectorAll('.option-btn');

            if (chosenRomaji === currentQuestion.romaji) {
                selectedBtn.classList.add('correct');
                score++;
                streak++;
            } else {
                selectedBtn.classList.add('wrong');
                streak = 0; // Seri bozuldu
                // Doğru olanı yeşille göster
                buttons.forEach(btn => {
                    if (btn.innerText === currentQuestion.romaji) btn.classList.add('correct');
                });
            }

            // Skorları güncelle ve LocalStorage'a yaz
            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            localStorage.setItem('jp_score', score);
            localStorage.setItem('jp_streak', streak);

            // 1 saniye sonra yeni soruya geç
            setTimeout(generateQuestion, 1000);
        }

        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
