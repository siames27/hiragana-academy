<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Amarin Hiragana Academy v2</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --bg-main: #0b0c10;
            --bg-card: #1f2833;
            --accent: #45f3ff;
            --text-main: #c5c6c7;
            --correct: #2ecc71;
            --wrong: #e74c3c;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
            -webkit-user-select: none;
            user-select: none;
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
            border: 1px solid #2f3e46;
            text-align: center;
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #8b9bb4;
            margin-bottom: 20px;
            border-bottom: 1px solid #2f3e46;
            padding-bottom: 10px;
        }
        .score-val { color: var(--accent); font-weight: bold; }
        .question-card {
            background: #151a21;
            border-radius: 12px;
            padding: 40px 20px;
            margin-bottom: 25px;
            border: 1px solid #252e3b;
        }
        .kana-display {
            font-size: 4.5rem;
            font-weight: bold;
            color: #fff;
            margin: 0;
            text-shadow: 0 0 15px rgba(69, 243, 255, 0.3);
            min-height: 110px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .mode-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #5f758e;
            margin-top: 15px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .option-btn {
            background: #252e3b;
            border: 2px solid #344457;
            color: #fff;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .option-btn:active { transform: scale(0.95); }
        .option-btn.correct { background: var(--correct) !important; border-color: var(--correct); color: #000; }
        .option-btn.wrong { background: var(--wrong) !important; border-color: var(--wrong); color: #fff; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="stats-bar">
            <div>Doğru: <span id="score" class="score-val">0</span></div>
            <div>Seri (Streak): <span id="streak" class="score-val" style="color:#ffaa00">0</span></div>
        </div>

        <div class="question-card">
            <div class="kana-display" id="kanaTarget">-</div>
            <div class="mode-label" id="modeLabel">-</div>
        </div>

        <div class="options-grid" id="optionsContainer"></div>
    </div>

    <script>
        // Veri setine 'row' (ses grubu) parametresi ekledim (Yanıltıcı şıklar için)
        const hiraganaData = [
            { kana: "あ", romaji: "a", row: "vowel" }, { kana: "い", romaji: "i", row: "vowel" }, { kana: "う", romaji: "u", row: "vowel" }, { kana: "え", romaji: "e", row: "vowel" }, { kana: "お", romaji: "o", row: "vowel" },
            { kana: "か", romaji: "ka", row: "k" }, { kana: "き", romaji: "ki", row: "k" }, { kana: "く", romaji: "ku", row: "k" }, { kana: "け", romaji: "ke", row: "k" }, { kana: "こ", romaji: "ko", row: "k" },
            { kana: "さ", romaji: "sa", row: "s" }, { kana: "し", romaji: "shi", row: "s" }, { kana: "す", romaji: "su", row: "s" }, { kana: "せ", romaji: "se", row: "s" }, { kana: "そ", romaji: "so", row: "s" },
            { kana: "た", romaji: "ta", row: "t" }, { kana: "ち", romaji: "chi", row: "t" }, { kana: "つ", romaji: "tsu", row: "t" }, { kana: "て", romaji: "te", row: "t" }, { kana: "と", romaji: "to", row: "t" }
        ];

        let currentQuestion = null;
        let lastQuestion = null; // Üst üste gelmeyi engellemek için
        let isKanaToRomaji = true; // Çift yönlü çalışma modu
        
        let score = parseInt(localStorage.getItem('jp_score')) || 0;
        let streak = parseInt(localStorage.getItem('jp_streak')) || 0;
        let canAnswer = true;

        const kanaTarget = document.getElementById('kanaTarget');
        const modeLabel = document.getElementById('modeLabel');
        const optionsContainer = document.getElementById('optionsContainer');
        const scoreDisplay = document.getElementById('score');
        const streakDisplay = document.getElementById('streak');

        function initQuiz() {
            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            generateQuestion();
        }

        function generateQuestion() {
            canAnswer = true;
            
            // 1. DÖNGÜ: Peş peşe aynı harfin gelmesini engelle
            do {
                currentQuestion = hiraganaData[Math.floor(Math.random() * hiraganaData.length)];
            } while (currentQuestion === lastQuestion);
            lastQuestion = currentQuestion;

            // 2. MOD SEÇİMİ: Sorunun yönünü rastgele değiştir (%50 ihtimal)
            isKanaToRomaji = Math.random() > 0.5;

            if (isKanaToRomaji) {
                kanaTarget.innerText = currentQuestion.kana;
                modeLabel.innerText = "Romaji Karşılığını Seç";
            } else {
                kanaTarget.innerText = currentQuestion.romaji;
                modeLabel.innerText = "Hiragana Karşılığını Seç";
            }

            // 3. AKILLI ÇELDIRICI SEÇİMİ: Öncelikle aynı ses grubundan (row) harfleri çek
            let smartDistractors = hiraganaData.filter(item => item.row === currentQuestion.row && item !== currentQuestion);
            
            // Eğer aynı gruptan yeterli harf yoksa diğer gruplardan rastgele tamamla
            if (smartDistractors.length < 3) {
                let leftovers = hiraganaData.filter(item => item.row !== currentQuestion.row);
                leftovers.sort(() => 0.5 - Math.random());
                smartDistractors = [...smartDistractors, ...leftovers.slice(0, 3 - smartDistractors.length)];
            } else {
                smartDistractors = smartDistractors.sort(() => 0.5 - Math.random()).slice(0, 3);
            }

            // Doğru ve yanlış cevapları aktif moda göre ayıkla
            let correctAnswer = isKanaToRomaji ? currentQuestion.romaji : currentQuestion.kana;
            let wrongAnswers = smartDistractors.map(item => isKanaToRomaji ? item.romaji : item.kana);

            let allOptions = [...wrongAnswers, correctAnswer].sort(() => 0.5 - Math.random());

            // Butonları ekrana bas
            optionsContainer.innerHTML = '';
            allOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(btn, opt, correctAnswer);
                optionsContainer.appendChild(btn);
            });
        }

        function checkAnswer(selectedBtn, chosenOpt, correctAnswer) {
            if (!canAnswer) return;
            canAnswer = false;

            const buttons = optionsContainer.querySelectorAll('.option-btn');

            if (chosenOpt === correctAnswer) {
                selectedBtn.classList.add('correct');
                score++;
                streak++;
            } else {
                selectedBtn.classList.add('wrong');
                streak = 0;
                buttons.forEach(btn => {
                    if (btn.innerText === correctAnswer) btn.classList.add('correct');
                });
            }

            scoreDisplay.innerText = score;
            streakDisplay.innerText = streak;
            localStorage.setItem('jp_score', score);
            localStorage.setItem('jp_streak', streak);

            setTimeout(generateQuestion, 1200);
        }

        document.addEventListener('DOMContentLoaded', initQuiz);
    </script>
</body>
</html>
